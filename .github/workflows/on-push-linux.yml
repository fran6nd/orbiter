name: On Push (Linux)

# Placeholder for future native Linux SDL3 builds.
#
# When the platform-abstraction layer is complete (Win32 message-pump and
# HWND references fully removed from the SDL3 code path) this workflow will
# be extended to run a real cmake --preset linux-x64-sdl3-release build on
# ubuntu-latest using gcc/clang + SDL3 FetchContent.  Until then it just
# checks out the repo so the workflow shows green and unblocks the branch.

on:
  push:
    branches:
      - linux
    paths-ignore: [ 'Doc/**', 'Flights/**', 'Html/**', 'Images/**', 'Localdoc/**', 'Scenarios/**', 'Textures/**', 'Textures2/**']
  pull_request:
    branches:
      - linux
    paths-ignore: [ 'Doc/**', 'Flights/**', 'Html/**', 'Images/**', 'Localdoc/**', 'Scenarios/**', 'Textures/**', 'Textures2/**']
  workflow_dispatch:

jobs:
  build:
    name: Push
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
